# Project config for the lean quality gate.
#
# This file exists so the lean reusable template's Python tests+coverage lane
# (gate 3) activates and enforces STRICT 100% line+branch. The template runs:
#   pip install pytest pytest-cov && python -m pytest --cov --cov-branch --cov-fail-under=100
# when it detects "pytest" in pyproject.toml (it does, below). The coverage
# settings mirror the existing .coveragerc so behaviour is identical to the
# legacy QZT CI; .coveragerc is retained for tools that read it directly.
#
# No build-system / packaging metadata is declared — env-inspector is run from
# source (env_inspector.py) and packaged as a Windows EXE via PyInstaller, not
# distributed as a wheel.

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]

[tool.coverage.run]
branch = true
source = ["."]
relative_files = true
omit = [
  "tests/*",
  ".venv/*",
  "build/*",
  "dist/*",
  "htmlcov/*",
  ".tmp_platform/*",
  "coverage_platform/*",
  "setup.py",
  "conftest.py",
  "scripts/__init__.py",
  "scripts/security_helpers.py",
  "scripts/quality/*",
]

[tool.coverage.report]
# Exclude unreachable / type-checker-only lines from the denominator so coverage
# reflects actual runtime behaviour (kept in sync with .coveragerc).
exclude_lines = [
  "pragma: no cover",
  "raise NotImplementedError",
  "if __name__ == .__main__.:",
  "if TYPE_CHECKING:",
  "if typing.TYPE_CHECKING:",
  '\.\.\. *$',
]
