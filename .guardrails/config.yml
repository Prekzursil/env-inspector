# GuardRails configuration
# Reference: https://docs.guardrails.io/docs/configuration
#
# Bounds the org-installed GuardRails App's scan to source code so its
# status check converges. All analyzers stay enabled with default
# rules; no findings are silenced.

version: 1

ignore-paths:
  - build
  - dist
  - coverage
  - docs
  - __pycache__
  - "**/__pycache__/**"
  - "**/build/**"
  - "**/dist/**"
  - "tests/**"

engines:
  python:
    enabled: true
    secrets:
      enabled: true
    sast:
      enabled: true
  general:
    secrets:
      enabled: true
    vulnerable_dependencies:
      enabled: true
