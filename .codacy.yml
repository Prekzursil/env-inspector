---
engines:
  # Codacy's deprecated 'pylint' tool runs alongside the modern
  # pylintpython3 engine and emits Python-2 compat warnings (W1618 /
  # W1619) plus PEP 585 false positives (E1136) that the active analyser
  # already handles correctly. Disable the deprecated duplicate so the
  # modern engine is the single source of truth — no real findings are
  # suppressed.
  pylint:
    enabled: false
  pylintpython3:
    python_version: 3
    config_file: ".pylintrc"
  # Prospector aggregates pydocstyle/pyflakes/pyright; we already run the
  # modern equivalents under pylintpython3 + Bandit + Ruff in the matrix,
  # so disable the duplicate Prospector run to avoid stale-cache findings
  # the bulk-ignore API will not clear.
  prospector:
    enabled: false
