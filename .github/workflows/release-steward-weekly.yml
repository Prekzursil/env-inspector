name: Release Steward Weekly

on:
  workflow_dispatch:
  schedule:
    - cron: "30 6 * * 1"

permissions:
  contents: read
  issues: write

jobs:
  checklist:
    runs-on: ubuntu-latest
    steps:
      - name: Open weekly release stewardship issue
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const date = new Date().toISOString().slice(0, 10);
            const titlePrefix = "Weekly release stewardship checklist (";
            const title = `${titlePrefix}${date})`;

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            const streamIssues = openIssues.filter(
              issue => !issue.pull_request && (issue.title || "").startsWith(titlePrefix),
            );
            const sameDate = streamIssues.find(issue => issue.title === title);

            async function closeStaleIssues(keeperNumber) {
              for (const issue of streamIssues) {
                if (issue.number === keeperNumber) {
                  continue;
                }
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body: `Superseded by #${keeperNumber}. Closing stale weekly release stewardship checklist.`,
                });
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issue.number,
                  state: "closed",
                  state_reason: "completed",
                });
              }
            }

            if (sameDate) {
              await closeStaleIssues(sameDate.number);
              core.info(`Issue already exists for ${title}: #${sameDate.number}`);
              return;
            }

            const body = [
              "## Weekly Release Stewardship Checklist",
              "",
              "- [ ] Run deterministic verification (`make verify`).",
              "- [ ] Review dependency update opportunities and risk notes.",
              "- [ ] Validate release artifact path for `env-inspector.exe` and checksum flow.",
              "- [ ] Confirm rollback notes for medium/high-risk open PRs.",
              "- [ ] Update changelog/release notes where needed.",
              "",
              "This issue is generated automatically to keep release quality and maintenance debt visible.",
            ].join("\n");

            const created = await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: ["area:release", "risk:low"],
            });

            await closeStaleIssues(created.data.number);
