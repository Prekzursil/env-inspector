name: quality

# Lean 6-gate quality (ADDITIVE — does not replace the existing QZT workflows).
# Thin caller of the shared reusable template. Pinned to the template BRANCH so
# this PR's CI exercises the real gate now; the migration runbook re-pins this
# `@feat/lean-quality-template` ref to a released tag once the template merges.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    uses: Prekzursil/quality-zero-platform/.github/workflows/reusable-quality.yml@v1
