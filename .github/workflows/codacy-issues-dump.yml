name: Codacy Issues Dump

on:
  workflow_dispatch:
  push:
    branches:
      - fix/quality-zero-2026-04-17

permissions:
  contents: read

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Fetch all open Codacy issues
        env:
          CODACY_API_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p codacy_dump
          python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request

          token = os.environ.get("CODACY_API_TOKEN", "").strip()
          if not token:
              raise SystemExit("CODACY_API_TOKEN missing")

          owner = "Prekzursil"
          repo = "env-inspector"
          base = "https://app.codacy.com/api/v3"
          url_base = f"{base}/analysis/organizations/gh/{owner}/repositories/{repo}/issues/search"
          headers = {
              "Accept": "application/json",
              "Content-Type": "application/json",
              "api-token": token,
              "User-Agent": "env-inspector-codacy-dump",
          }

          all_issues = []
          cursor = None
          while True:
              q = {"limit": 100}
              if cursor:
                  q["cursor"] = cursor
              url = f"{url_base}?{urllib.parse.urlencode(q)}"
              req = urllib.request.Request(url, headers=headers, method="POST", data=b"{}")
              try:
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      payload = json.loads(resp.read().decode("utf-8"))
              except Exception as exc:
                  print(f"ERROR: {exc}")
                  break
              data = payload.get("data") or []
              all_issues.extend(data)
              pagination = payload.get("pagination") or {}
              cursor = pagination.get("cursor")
              if not cursor:
                  break
              print(f"page collected: {len(all_issues)} so far")

          print(f"TOTAL ISSUES: {len(all_issues)}")
          with open("codacy_dump/issues.json", "w", encoding="utf-8") as fh:
              json.dump(all_issues, fh, indent=2, sort_keys=True)

          summary = {}
          for issue in all_issues:
              pat = issue.get("patternInfo", {}).get("id") or "?"
              summary[pat] = summary.get(pat, 0) + 1
          with open("codacy_dump/summary.json", "w", encoding="utf-8") as fh:
              json.dump(summary, fh, indent=2, sort_keys=True)
          PY
      - name: Upload issues
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: codacy-issues-dump
          path: codacy_dump/
          if-no-files-found: warn
          retention-days: 7
