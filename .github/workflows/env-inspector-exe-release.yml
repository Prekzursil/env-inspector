name: env-inspector-exe-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Build env-inspector.exe
        shell: pwsh
        run: |
          ./build-windows-exe.ps1
          if (!(Test-Path "dist/env-inspector.exe")) {
            throw "Expected dist/env-inspector.exe was not generated."
          }

      - name: Generate SHA256 checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Path "dist/env-inspector.exe" -Algorithm SHA256).Hash.ToLower()
          "$hash  env-inspector.exe" | Out-File -FilePath "dist/env-inspector.exe.sha256" -Encoding ascii

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: env-inspector-exe
          path: |
            dist/env-inspector.exe
            dist/env-inspector.exe.sha256
          if-no-files-found: error

      - name: Resolve release tag
        id: release_tag
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            let tag = "";
            if ((context.ref || "").startsWith("refs/tags/")) {
              tag = context.ref.slice("refs/tags/".length);
            }
            core.setOutput("tag", tag);

      - name: Create or update release
        if: ${{ steps.release_tag.outputs.tag != '' }}
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: ${{ steps.release_tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          body: |
            ## Env Inspector Release
            Cross-platform environment variable inspector/editor for Windows, WSL, and Linux.

            ### Assets
            - `env-inspector.exe`
            - `env-inspector.exe.sha256`
          files: |
            dist/env-inspector.exe
            dist/env-inspector.exe.sha256
