name: Quality Zero Backlog

permissions: {}

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  backlog-sweep:
    permissions:
      contents: write
      pull-requests: write
    uses: Prekzursil/quality-zero-platform/.github/workflows/reusable-backlog-sweep.yml@be1d889a693c2fcca3b8061350ad1a61bd777fbd
    with:
      repo_slug: ${{ github.repository }}
      lane: quality
      platform_repository: Prekzursil/quality-zero-platform
      platform_ref: main
    secrets:
      CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
