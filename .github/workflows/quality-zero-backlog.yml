name: Quality Zero Backlog

permissions: {}

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  backlog-sweep:
    permissions:
      contents: write
      pull-requests: write
    uses: Prekzursil/quality-zero-platform/.github/workflows/reusable-backlog-sweep.yml@9844de05e8610409514a059886aa0f7bc7ab58c1
    with:
      repo_slug: ${{ github.repository }}
      lane: quality
    secrets:
      CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
