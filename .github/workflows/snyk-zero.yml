name: Snyk Zero

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  snyk-zero:
    name: Snyk Zero
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      REPO_NAME: ${{ github.event.repository.name }}
      SNYK_PROJECT_URL: ${{ vars.SNYK_PROJECT_URL }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Set up .NET (SWFOC only)
        if: ${{ github.event.repository.name == 'SWFOC-Mod-Menu' }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Detect Snyk token
        id: token
        run: |
          if [ -z "${SNYK_TOKEN}" ]; then
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "SNYK_TOKEN is missing; Snyk scans will be skipped."
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect OSS scan strategy
        id: detect
        if: ${{ steps.token.outputs.has_token == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          : > artifacts/detected-targets.txt

          repo="${REPO_NAME}"
          has_target=false
          oss_mode="skipped"
          skip_reason="unsupported_target_files"
          oss_cmd=""

          add_target() {
            printf '%s\n' "$1" >> artifacts/detected-targets.txt
          }

          if [ "$repo" = "env-inspector" ]; then
            if [ -f requirements-build.txt ]; then
              python3 -m pip install --upgrade pip
              python3 -m pip install -r requirements-build.txt
              has_target=true
              oss_mode="executed"
              skip_reason=""
              oss_cmd="snyk test --file=requirements-build.txt --package-manager=pip --severity-threshold=low"
              add_target "requirements-build.txt"
            fi
          elif [ "$repo" = "SWFOC-Mod-Menu" ]; then
            if [ -f SwfocTrainer.sln ]; then
              dotnet restore SwfocTrainer.sln
            fi
            if find . -name project.assets.json -print -quit | grep -q .; then
              has_target=true
              oss_mode="executed"
              skip_reason=""
              oss_cmd="snyk test --all-projects --severity-threshold=low"
              add_target "project.assets.json"
            fi
          elif [ "$repo" = "Star-Wars-Galactic-Battlegrounds-Save-Game-Editor" ]; then
            has_target=false
            oss_mode="skipped"
            skip_reason="unsupported_target_files"
          else
            if find . -maxdepth 5 \
              \( -name package-lock.json -o -name yarn.lock -o -name pnpm-lock.yaml -o -name package.json \
                 -o -name requirements.txt -o -name 'requirements-*.txt' -o -name pyproject.toml \
                 -o -name Pipfile -o -name poetry.lock -o -name go.mod -o -name pom.xml \
                 -o -name build.gradle -o -name build.gradle.kts -o -name gradle.lockfile \
                 -o -name '*.csproj' -o -name '*.sln' -o -name Gemfile -o -name Cargo.toml \
              \) -print -quit | grep -q .; then
              has_target=true
              oss_mode="executed"
              skip_reason=""
              oss_cmd="snyk test --all-projects --severity-threshold=low"
              while IFS= read -r f; do
                add_target "$f"
              done < <(find . -maxdepth 5 \
                \( -name package-lock.json -o -name yarn.lock -o -name pnpm-lock.yaml -o -name package.json \
                   -o -name requirements.txt -o -name 'requirements-*.txt' -o -name pyproject.toml \
                   -o -name Pipfile -o -name poetry.lock -o -name go.mod -o -name pom.xml \
                   -o -name build.gradle -o -name build.gradle.kts -o -name gradle.lockfile \
                   -o -name '*.csproj' -o -name '*.sln' -o -name Gemfile -o -name Cargo.toml \
                \) -print | sort | head -n 100)
            fi
          fi

          echo "has_target=${has_target}" >> "$GITHUB_OUTPUT"
          echo "oss_mode=${oss_mode}" >> "$GITHUB_OUTPUT"
          echo "skip_reason=${skip_reason}" >> "$GITHUB_OUTPUT"
          {
            echo 'oss_cmd<<EOF'
            echo "$oss_cmd"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Snyk OSS test
        id: oss
        if: ${{ steps.token.outputs.has_token == 'true' && steps.detect.outputs.has_target == 'true' }}
        shell: bash
        run: |
          set +e
          mkdir -p artifacts
          bash -lc "${{ steps.detect.outputs.oss_cmd }}" 2>&1 | tee artifacts/snyk-oss.log
          scan_exit=${PIPESTATUS[0]}
          set -e
          echo "executed=true" >> "$GITHUB_OUTPUT"
          echo "exit_code=${scan_exit}" >> "$GITHUB_OUTPUT"

      - name: Snyk code test
        id: code
        if: ${{ steps.token.outputs.has_token == 'true' }}
        shell: bash
        run: |
          set +e
          mkdir -p artifacts
          snyk code test --severity-threshold=low 2>&1 | tee artifacts/snyk-code.log
          scan_exit=${PIPESTATUS[0]}
          set -e
          echo "executed=true" >> "$GITHUB_OUTPUT"
          echo "exit_code=${scan_exit}" >> "$GITHUB_OUTPUT"

      - name: Build snyk-oss-mode.json and enforce failure policy
        id: finalize
        if: ${{ always() }}
        env:
          HAS_TOKEN: ${{ steps.token.outputs.has_token }}
          HAS_TARGET: ${{ steps.detect.outputs.has_target }}
          OSS_MODE: ${{ steps.detect.outputs.oss_mode }}
          SKIP_REASON: ${{ steps.detect.outputs.skip_reason }}
          OSS_EXECUTED: ${{ steps.oss.outputs.executed }}
          OSS_EXIT_CODE: ${{ steps.oss.outputs.exit_code }}
          CODE_EXECUTED: ${{ steps.code.outputs.executed }}
          CODE_EXIT_CODE: ${{ steps.code.outputs.exit_code }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          from scripts.quality.snyk_policy import classify_scan, decide_policy

          detected_path = Path('artifacts/detected-targets.txt')
          detected = []
          if detected_path.exists():
              for line in detected_path.read_text().splitlines():
                  line = line.strip()
                  if line:
                      detected.append(line)

          def _as_bool(raw: str) -> bool:
              return str(raw or "").strip().lower() == "true"

          def _as_int(raw: str) -> int:
              try:
                  return int(str(raw or "0").strip())
              except ValueError:
                  return 0

          def _read(path: str) -> str:
              candidate = Path(path)
              if not candidate.exists():
                  return ""
              return candidate.read_text(encoding="utf-8", errors="replace")

          has_token = os.getenv('HAS_TOKEN', '').lower() == 'true'
          has_target = os.getenv('HAS_TARGET', '').lower() == 'true'
          oss_mode = os.getenv('OSS_MODE') or ('executed' if has_target else 'skipped')
          skip_reason = os.getenv('SKIP_REASON', '')
          oss_executed = _as_bool(os.getenv('OSS_EXECUTED'))
          code_executed = _as_bool(os.getenv('CODE_EXECUTED'))
          oss_exit_code = _as_int(os.getenv('OSS_EXIT_CODE'))
          code_exit_code = _as_int(os.getenv('CODE_EXIT_CODE'))

          oss_log = _read('artifacts/snyk-oss.log')
          code_log = _read('artifacts/snyk-code.log')

          oss_outcome = classify_scan(
              executed=(has_token and has_target and oss_executed),
              exit_code=oss_exit_code,
              log_text=oss_log,
          )
          code_outcome = classify_scan(
              executed=(has_token and code_executed),
              exit_code=code_exit_code,
              log_text=code_log,
          )

          project_url = (os.getenv('SNYK_PROJECT_URL') or '').strip()
          if not project_url:
              project_url = f"https://app.snyk.io/org/prekzursil1993/projects?search={os.getenv('REPO_NAME', '')}"

          decision = decide_policy(
              oss_outcome=oss_outcome,
              code_outcome=code_outcome,
              project_url=project_url,
          )

          payload = {
              'has_token': has_token,
              'oss_mode': oss_mode,
              'detected_targets': detected,
              'skip_reason': skip_reason,
              'code_scan_executed': has_token,
              'oss_scan_executed': has_token and has_target,
              'oss_outcome': oss_outcome,
              'code_outcome': code_outcome,
              'quota_detected': decision['quota_detected'],
              'findings_detected': decision['findings_detected'],
              'runtime_error_detected': decision['runtime_error_detected'],
              'decision': decision['decision'],
              'decision_reason': decision['decision_reason'],
              'manual_retest_required': decision['manual_retest_required'],
              'manual_retest_instruction': decision['manual_retest_instruction'],
              'project_url': decision['project_url'],
          }

          out = Path('artifacts/snyk-oss-mode.json')
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(json.dumps(payload, indent=2) + '\n')
          print(json.dumps(payload, indent=2))

          if payload['manual_retest_required']:
              print('Snyk result requires manual retest before rerun.')
              print(f"Project URL: {payload['project_url']}")
              print("Action: open the project URL, click 'Retest now', then rerun Snyk Zero.")

          if payload['decision'] != 'pass':
              raise SystemExit(1)
          PY

      - name: Upload Snyk mode artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: snyk-oss-mode
          path: |
            artifacts/snyk-oss-mode.json
            artifacts/detected-targets.txt
            artifacts/snyk-oss.log
            artifacts/snyk-code.log
