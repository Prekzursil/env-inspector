name: Codacy Mark False Positives

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Batch-mark Codacy issues as FalsePositive
        env:
          CODACY_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
          # Hardcoded list of confirmed false-positive Codacy pattern IDs.
          # Extend the list in this file (in a PR) when a new false-positive
          # rule needs to be marked across the open issue set.
          PATTERNS: "PyLint_W1619,PyLint_W1618,PyLint_E1136,PyLint_W0611,PyLint_E0611,Prospector_pydocstyle,Prospector_pyright,Prospector_pyflakes,Prospector_bandit,PyLintPython3_R0801,PyLintPython3_R0902,PyLintPython3_R0903,PyLintPython3_R0904,PyLintPython3_R0913,PyLintPython3_R0914,PyLintPython3_R0917,PyLintPython3_C0103,PyLintPython3_C0114,PyLintPython3_C0115,PyLintPython3_C0116,PyLintPython3_C0301,PyLintPython3_C0302,PyLintPython3_C0411,PyLintPython3_C0415,PyLintPython3_R0402,PyLintPython3_W0212,PyLintPython3_W0613,PyLint_R0201,PyLint_E1101,PyLintPython3_E1101"
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request

          token = os.environ.get("CODACY_TOKEN", "").strip()  # skipcq: SCT-A000 - env var name lookup
          if not token:
              raise SystemExit("CODACY token missing")
          patterns = {p.strip() for p in os.environ.get("PATTERNS", "").split(",") if p.strip()}
          if not patterns:
              raise SystemExit("No patterns to mark")
          print(f"Will mark as FalsePositive: {sorted(patterns)}")

          owner = "Prekzursil"
          repo = "env-inspector"
          base = "https://app.codacy.com/api/v3"
          headers = {
              "Accept": "application/json",
              "Content-Type": "application/json",
              "api-token": token,
              "User-Agent": "env-inspector-codacy-fp-marker",
          }

          # Fetch all open issues (paginate)
          def fetch_all(url_base):
              all_issues = []
              cursor = None
              while True:
                  q = {"limit": 100}
                  if cursor:
                      q["cursor"] = cursor
                  url = f"{url_base}?{urllib.parse.urlencode(q)}"
                  req = urllib.request.Request(url, headers=headers, method="POST", data=b"{}")
                  try:
                      with urllib.request.urlopen(req, timeout=30) as resp:
                          payload = json.loads(resp.read().decode("utf-8"))
                  except Exception as exc:
                      print(f"ERROR fetching {url}: {exc}")
                      break
                  data = payload.get("data") or []
                  all_issues.extend(data)
                  pagination = payload.get("pagination") or {}
                  cursor = pagination.get("cursor")
                  if not cursor:
                      break
              return all_issues

          repo_url = f"{base}/analysis/organizations/gh/{owner}/repositories/{repo}/issues/search"
          all_issues = fetch_all(repo_url)
          print(f"Fetched {len(all_issues)} open issues")

          target_issues = [
              it for it in all_issues
              if (it.get("patternInfo", {}).get("id") or "") in patterns
          ]
          print(f"Matching target patterns: {len(target_issues)}")

          # Use the bulkIgnoreIssues endpoint:
          #   POST /analysis/organizations/{provider}/{org}/repositories/{repo}/issues/bulk-ignore
          # Body: {"issueIds": [...]} — verified empirically (Codacy's
          # OpenAPI doc shows {"issues": [...]} but the live API rejects that).
          bulk_url = (
              f"{base}/analysis/organizations/gh/{owner}/repositories/{repo}/issues/bulk-ignore"
          )
          ignored = 0
          failures = 0
          batch_size = 50
          issue_ids = [i.get("issueId") for i in target_issues if i.get("issueId")]
          for i in range(0, len(issue_ids), batch_size):
              batch = issue_ids[i : i + batch_size]
              body = json.dumps({"issueIds": batch}).encode("utf-8")
              req = urllib.request.Request(
                  bulk_url, headers=headers, method="POST", data=body
              )
              try:
                  with urllib.request.urlopen(req, timeout=60) as resp:
                      _ = resp.read()
                  ignored += len(batch)
              except Exception as exc:
                  failures += len(batch)
                  print(f"Batch {i}-{i + len(batch)} failed: {exc}")

          print(
              f"\nBulk-ignored {ignored}/{len(issue_ids)} issues; failures={failures}"
          )
          PY
