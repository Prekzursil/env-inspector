name: Codacy Mark False Positives

on:
  workflow_dispatch:
    inputs:
      patterns:
        description: Comma-separated list of Codacy pattern IDs to mark as FalsePositive.
        required: false
        default: "PyLint_W1619,PyLint_W1618,PyLint_E1136,PyLint_W0611,PyLint_E0611"

permissions:
  contents: read

jobs:
  mark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Batch-mark Codacy issues as FalsePositive
        env:
          CODACY_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
          PATTERNS: ${{ github.event.inputs.patterns }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request

          token = os.environ.get("CODACY_TOKEN", "").strip()
          if not token:
              raise SystemExit("CODACY token missing")
          patterns = {p.strip() for p in os.environ.get("PATTERNS", "").split(",") if p.strip()}
          if not patterns:
              raise SystemExit("No patterns to mark")
          print(f"Will mark as FalsePositive: {sorted(patterns)}")

          owner = "Prekzursil"
          repo = "env-inspector"
          base = "https://app.codacy.com/api/v3"
          headers = {
              "Accept": "application/json",
              "Content-Type": "application/json",
              "api-token": token,
              "User-Agent": "env-inspector-codacy-fp-marker",
          }

          # Fetch all open issues (paginate)
          def fetch_all(url_base):
              all_issues = []
              cursor = None
              while True:
                  q = {"limit": 100}
                  if cursor:
                      q["cursor"] = cursor
                  url = f"{url_base}?{urllib.parse.urlencode(q)}"
                  req = urllib.request.Request(url, headers=headers, method="POST", data=b"{}")
                  try:
                      with urllib.request.urlopen(req, timeout=30) as resp:
                          payload = json.loads(resp.read().decode("utf-8"))
                  except Exception as exc:
                      print(f"ERROR fetching {url}: {exc}")
                      break
                  data = payload.get("data") or []
                  all_issues.extend(data)
                  pagination = payload.get("pagination") or {}
                  cursor = pagination.get("cursor")
                  if not cursor:
                      break
              return all_issues

          repo_url = f"{base}/analysis/organizations/gh/{owner}/repositories/{repo}/issues/search"
          all_issues = fetch_all(repo_url)
          print(f"Fetched {len(all_issues)} open issues")

          target_issues = [
              it for it in all_issues
              if (it.get("patternInfo", {}).get("id") or "") in patterns
          ]
          print(f"Matching target patterns: {len(target_issues)}")

          marked = 0
          failures = 0
          for issue in target_issues:
              issue_id = issue.get("issueId") or issue.get("resultDataId")
              if not issue_id:
                  continue
              # Try different known endpoints; Codacy has changed API versions
              endpoints = [
                  f"{base}/organizations/gh/{owner}/repositories/{repo}/issues/{issue_id}/status",
                  f"{base}/analysis/organizations/gh/{owner}/repositories/{repo}/issues/{issue_id}/status",
              ]
              body = json.dumps({"status": "FalsePositive"}).encode("utf-8")
              done = False
              for url in endpoints:
                  req = urllib.request.Request(url, headers=headers, method="PATCH", data=body)
                  try:
                      with urllib.request.urlopen(req, timeout=30) as resp:
                          _ = resp.read()
                      marked += 1
                      done = True
                      break
                  except Exception as exc:
                      last_err = str(exc)
                      continue
              if not done:
                  failures += 1
                  if failures <= 3:
                      print(f"FAILED to mark {issue_id}: {last_err}")

          print(f"\nMarked {marked}/{len(target_issues)} issues; failures={failures}")
          PY
