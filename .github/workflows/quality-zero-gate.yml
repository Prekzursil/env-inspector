name: Quality Zero Gate

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  aggregate-gate:
    permissions:
      contents: read
    uses: Prekzursil/quality-zero-platform/.github/workflows/reusable-quality-zero-gate.yml@cb067b5a04b596deef983f93eac95f227b9dc09c
    with:
      repo_slug: ${{ github.repository }}
      event_name: ${{ github.event_name }}
      sha: ${{ github.event.pull_request.head.sha || github.sha }}
      platform_repository: Prekzursil/quality-zero-platform
      platform_ref: main
