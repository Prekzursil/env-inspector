name: Codecov Analytics

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codecov-analytics:
    name: Codecov Analytics
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Run python coverage
        continue-on-error: true
        run: |
          mkdir -p coverage
          mkdir -p .tmp
          export TMPDIR="$PWD/.tmp"
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          python -m pip install pytest pytest-cov
          python -m pytest -q -s tests --cov=tests --cov-report=xml:coverage/python-coverage.xml
      - name: Upload coverage to Codecov
        if: ${{ always() }}
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          files: coverage/python-coverage.xml
          flags: python
          fail_ci_if_error: true
          verbose: true

      - name: Upload coverage to Codacy
        if: ${{ always() }}
        env:
          CODACY_API_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
          CODACY_ORGANIZATION_PROVIDER: gh
          CODACY_USERNAME: Prekzursil
          CODACY_PROJECT_NAME: ${{ github.event.repository.name }}
        run: |
          if [ -z "${CODACY_API_TOKEN}" ]; then
            echo "Missing CODACY_API_TOKEN" >&2
            exit 1
          fi
          if [ ! -f coverage/python-coverage.xml ]; then
            echo "Missing coverage report: coverage/python-coverage.xml" >&2
            exit 1
          fi

          bash <(curl -Ls https://coverage.codacy.com/get.sh) report \
            -r coverage/python-coverage.xml \
            --partial
          bash <(curl -Ls https://coverage.codacy.com/get.sh) final
