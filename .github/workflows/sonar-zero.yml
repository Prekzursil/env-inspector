name: Sonar Zero

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sonar-zero:
    name: Sonar Zero
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY || 'Prekzursil_env-inspector' }}
    steps:
      - uses: actions/checkout@v6
      - name: Assert Sonar open issue count and quality gate are zero/OK
        run: |
          python3 scripts/quality/check_sonar_zero.py \
            --project-key "${SONAR_PROJECT_KEY}" \
            --branch main \
            --out-json "sonar-zero/sonar.json" \
            --out-md "sonar-zero/sonar.md"
      - name: Upload Sonar artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-zero
          path: sonar-zero
