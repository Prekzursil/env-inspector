name: Agent Task Queue

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

jobs:
  queue:
    if: ${{ github.event.label.name == 'agent:ready' && github.event.issue.pull_request == null }}
    runs-on: ubuntu-latest
    env:
      VERIFY_COMMAND: make verify
    steps:
      - name: Build agent task packet and notify Copilot
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            
            // Idempotency guard: check if queue comment already exists
            const existingComments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number
            });
            
            const queueMarker = "@copilot Please implement this task using the repository guardrails.";
            const alreadyQueued = existingComments.data.some(c => c.body.includes(queueMarker));
            
            if (alreadyQueued) {
              core.info("Task already queued. Skipping duplicate comment.");
              return;
            }

            // Add labels with rollback capability
            let labelsAdded = false;
            let labelRemoved = false;
            
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ["agent:in-progress"]
              });
              labelsAdded = true;

              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name: "agent:ready"
                });
                labelRemoved = true;
              } catch (error) {
                // Only ignore expected errors (404: label not found, 422: validation error)
                if (error.status === 404 || error.status === 422) {
                  core.info(`Label 'agent:ready' not found or already removed: ${error.message}`);
                } else {
                  throw error;
                }
              }

              const body = [
                "@copilot Please implement this task using the repository guardrails.",
                "",
                "### Execution Contract",
                "1. Keep the change minimal and in scope.",
                "2. Run deterministic verification before requesting review.",
                `3. Required verification command: \`${process.env.VERIFY_COMMAND}\`.`,
                "4. Include PR sections: Summary, Risk, Evidence, Rollback, Scope Guard.",
                "5. Do not merge; maintainers perform final human review.",
                "",
                "### Source Issue",
                `- #${issue.number}: ${issue.title}`
              ].join("\n");

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body
              });
            } catch (error) {
              // Rollback on failure: restore previous label state
              core.error(`Queue mutation failed: ${error.message}`);
              
              if (labelsAdded) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    name: "agent:in-progress"
                  });
                  core.info("Rollback: Removed 'agent:in-progress' label.");
                } catch (rollbackError) {
                  core.warning(`Rollback failed: ${rollbackError.message}`);
                }
              }
              
              if (labelRemoved) {
                try {
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    labels: ["agent:ready"]
                  });
                  core.info("Rollback: Restored 'agent:ready' label.");
                } catch (rollbackError) {
                  core.warning(`Rollback failed: ${rollbackError.message}`);
                }
              }
              
              throw error;
            }
