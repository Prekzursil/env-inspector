name: SonarCloud Scan

permissions:
  contents: read
  pull-requests: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          # Shallow clones disable Sonar's blame information; fetch full history.
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install test deps and run with coverage
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-cov
          # Use ``--cov=.`` (repo root) so coverage.xml has a single
          # ``<source>`` element that SonarCloud's Cobertura sensor can
          # use to map ``<class filename>`` paths back to indexed files.
          # Coverage scope (which files count) is governed by
          # ``.coveragerc`` (omits tests/, scripts/quality/**, etc).
          # The previous per-package style (``--cov=env_inspector ...``)
          # produced multiple ``<source>`` roots that Sonar couldn't
          # disambiguate, so coverage applied to nothing and the
          # project showed ``line_coverage=0%``.
          pytest -q --cov=. --cov-branch --cov-report=xml:coverage.xml || true

          # Post-process coverage.xml: ``relative_files = True`` produces
          # multiple empty ``<source>`` elements which Sonar's Cobertura
          # sensor can't resolve against indexed source files. Replace
          # with a single ``<source>`` pointing at the project root so
          # ``<class filename>`` lookup works.
          if [ -f coverage.xml ]; then
            python - <<'PY'
          import xml.etree.ElementTree as ET
          import os

          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          sources = root.find('sources')
          if sources is not None:
              for src in list(sources):
                  sources.remove(src)
              new_src = ET.SubElement(sources, 'source')
              new_src.text = os.getcwd()
          tree.write('coverage.xml', xml_declaration=True, encoding='utf-8')
          print('Patched <sources> to single absolute repo root.')
          PY
            head -8 coverage.xml
          fi

      - name: SonarCloud Scan
        # The 40-hex value after @ is the SonarSource sonarqube-scan-action's
        # git commit SHA (required by Codacy's
        # third-party-action-not-pinned-to-commit-sha rule). Semgrep's
        # secrets.sonarqube-docs-api-key rule matches the same 40-hex shape
        # and flags this as a hardcoded API key — that's a false positive
        # because git commit SHAs and SonarQube API keys share the same
        # 40-hex shape but only one of those (the API key) carries
        # credential value.
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4  # v5  # nosemgrep
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
