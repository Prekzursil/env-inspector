name: SonarCloud Scan

permissions:
  contents: read
  pull-requests: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          # Shallow clones disable Sonar's blame information; fetch full history.
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install test deps and run with coverage
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-cov defusedxml
          # Use ``--cov=.`` (repo root) so coverage.xml has a single
          # ``<source>`` element that SonarCloud's Cobertura sensor can
          # use to map ``<class filename>`` paths back to indexed files.
          # Coverage scope (which files count) is governed by
          # ``.coveragerc`` (omits tests/, scripts/quality/**, etc).
          pytest -q --cov=. --cov-branch --cov-report=xml:coverage.xml || true

          # SonarCloud's Cobertura sensor for Python silently drops all
          # hits on this project (parses coverage.xml in <250ms and
          # applies 0% coverage). Generate Sonar Generic Test Coverage
          # XML directly so the ``path`` attributes map 1:1 against
          # indexed source files, bypassing whatever path resolution
          # issue the Cobertura sensor has.
          if [ -f coverage.xml ]; then
            python scripts/cobertura_to_sonar_generic.py \
              --in coverage.xml \
              --out coverage-sonar.xml
            head -10 coverage-sonar.xml
          fi

      - name: SonarCloud Scan
        # The 40-hex value after @ is the SonarSource sonarqube-scan-action's
        # git commit SHA (required by Codacy's
        # third-party-action-not-pinned-to-commit-sha rule). Semgrep's
        # secrets.sonarqube-docs-api-key rule matches the same 40-hex shape
        # and flags this as a hardcoded API key — that's a false positive
        # because git commit SHAs and SonarQube API keys share the same
        # 40-hex shape but only one of those (the API key) carries
        # credential value.
        uses: SonarSource/sonarqube-scan-action@c7ee0f9df90b7aa20e8dcf9695dcfe2e7da5b4f2  # v5  # nosemgrep
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
