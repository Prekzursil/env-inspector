name: Branch Protection Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '30 6 * * 1'

permissions:
  administration: read
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Audit main branch protection
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = "main";
            const findings = [];

            const titlePrefix = "Branch protection audit findings - ";
            const title = `${titlePrefix}${new Date().toISOString().slice(0, 10)}`;

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            const streamIssues = openIssues.filter(
              issue => !issue.pull_request && (issue.title || "").startsWith(titlePrefix),
            );
            const sameDate = streamIssues.find(issue => issue.title === title);

            async function closeStaleIssues(keeperNumber, reason) {
              for (const issue of streamIssues) {
                if (issue.number === keeperNumber) {
                  continue;
                }
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body: reason,
                });
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issue.number,
                  state: "closed",
                  state_reason: "completed",
                });
              }
            }

            let protection;
            let integrationAccessLimited = false;
            try {
              protection = await github.rest.repos.getBranchProtection({ owner, repo, branch });
            } catch (error) {
              const message = String(error?.message || error);
              if (message.includes("Resource not accessible by integration")) {
                integrationAccessLimited = true;
                core.warning(`Non-actionable audit limitation for ${branch}: ${message}`);
              } else {
                findings.push(`Branch protection missing or inaccessible for ${branch}: ${message}`);
              }
            }

            if (protection?.data) {
              const reviews = protection.data.required_pull_request_reviews;
              const checks = protection.data.required_status_checks;

              if (!reviews || (reviews.required_approving_review_count ?? 0) < 1) {
                findings.push("Required approving review count is below 1.");
              }

              if (!checks) {
                findings.push("Required status checks are not configured.");
              }
            }

            if (findings.length === 0) {
              if (streamIssues.length > 0) {
                const note = integrationAccessLimited
                  ? "Closing stale branch-protection audit finding. Latest run hit non-actionable integration access limits."
                  : "Closing stale branch-protection audit finding. Latest audit found no actionable findings.";
                await closeStaleIssues(-1, note);
              }
              return;
            }

            if (sameDate) {
              await closeStaleIssues(
                sameDate.number,
                `Superseded by #${sameDate.number}. Closing stale branch-protection audit finding issue.`,
              );
              core.info(`Issue already exists for ${title}: #${sameDate.number}`);
              return;
            }

            const body = [
              "## Findings",
              ...findings.map(f => `- ${f}`),
              "",
              "## Required action",
              "- Update branch protection to meet Phase-3/4 policy baseline.",
            ].join("\n");

            const created = await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: ["area:security", "risk:medium"],
            });

            await closeStaleIssues(
              created.data.number,
              `Superseded by #${created.data.number}. Closing stale branch-protection audit finding issue.`,
            );
