name: env-inspector-ci

on:
  pull_request:
  push:
    branches:
      - main
      - release/**
      - feature/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Compile check
        shell: bash
        run: |
          python -m py_compile env_inspector.py env_inspector_core/*.py env_inspector_gui/*.py tests/*.py

      - name: Run tests
        shell: bash
        run: |
          pytest -q -s
