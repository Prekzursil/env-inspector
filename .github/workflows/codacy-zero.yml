name: Codacy Zero

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codacy-zero:
    name: Codacy Zero
    runs-on: ubuntu-latest
    env:
      CODACY_API_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
      CODACY_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
      - name: Assert Codacy open issue count is zero
        run: |
          python3 scripts/quality/check_codacy_zero.py \
            --provider gh \
            --owner "${GITHUB_REPOSITORY_OWNER}" \
            --repo "${{ github.event.repository.name }}" \
            --branch "${CODACY_BRANCH}" \
            --out-json "codacy-zero/codacy.json" \
            --out-md "codacy-zero/codacy.md"
      - name: Upload Codacy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codacy-zero
          path: codacy-zero
