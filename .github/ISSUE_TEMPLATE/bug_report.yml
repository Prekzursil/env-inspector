name: Bug report
description: Report a reproducible defect.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
      placeholder: Describe the bug clearly.
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Windows
        - Linux
        - WSL
        - Other
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction Steps
      description: Provide exact commands/clicks to reproduce.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Errors
      description: Paste errors/log snippets with secrets redacted.
      render: shell
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Version / Tag
      placeholder: v1.0.0
    validations:
      required: false
