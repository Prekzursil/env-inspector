codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "100...100"
  status:
    project:
      default:
        target: 100%
        threshold: 0%
    patch:
      default:
        target: 100%
        threshold: 0%

comment:
  layout: "reach,diff,flags,files"

flags:
  python:
    paths:
      - env_inspector_core/

component_management:
  default_rules:
    statuses:
      - type: project
        target: 100%
        threshold: 0%
  individual_components:
    - component_id: python
      name: python
      paths:
        - env_inspector_core/

bundle_analysis:
  warning_threshold: "0%"
  status: informational
